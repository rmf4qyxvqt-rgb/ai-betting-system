<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IA Sports" />
  <meta name="theme-color" content="#06101a" />
  <title>IA Sports - Mobile</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%2300c2ff' width='192' height='192'/><text x='96' y='120' font-size='100' fill='white' text-anchor='middle' font-weight='bold'>⚽</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #06101a;
      --bg-2: #0c1726;
      --card: #102032;
      --line: #24364c;
      --txt: #e9f1fb;
      --muted: #93a8bf;
      --ok: #1dd1a1;
      --warn: #f7b731;
      --risk: #ff6b6b;
      --accent: #00c2ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Manrope", sans-serif;
      color: var(--txt);
      background: linear-gradient(145deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: 80px;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .container {
      padding: 12px;
      max-width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      background: linear-gradient(135deg, #12253a, #0f1e2f);
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .header h1 {
      font-size: 1.2rem;
      background: linear-gradient(135deg, #00c2ff, #f7b731);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .refresh-btn {
      background: var(--accent);
      color: var(--bg-1);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .refresh-btn:active {
      transform: scale(0.9);
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .kpi-card {
      background: linear-gradient(160deg, #102032, #0f1b2b);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .kpi-value {
      font-size: 1.4rem;
      font-weight: 800;
    }

    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .risk { color: var(--risk); }
    .accent { color: var(--accent); }

    .card {
      background: linear-gradient(160deg, #102032, #0f1b2b);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,194,255,0.3), transparent);
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #dce9f8;
    }

    .tab-navigation {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 0;
      background: linear-gradient(180deg, rgba(6,16,26,0.95), rgba(6,16,26,1));
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 1000;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      text-align: center;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .tab-btn.active {
      color: var(--accent);
      background: rgba(0,194,255,0.1);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .alert-box {
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(247, 183, 49, 0.15));
      border-left: 4px solid var(--warn);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.85rem;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.65rem;
      font-weight: 700;
      margin-right: 6px;
    }

    .tag-ok { background: rgba(29, 209, 161, 0.2); color: var(--ok); }
    .tag-warn { background: rgba(247, 183, 49, 0.2); color: var(--warn); }
    .tag-risk { background: rgba(255, 107, 107, 0.2); color: var(--risk); }

    .jogo-item {
      background: rgba(16, 32, 50, 0.6);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .jogo-item:active {
      background: rgba(16, 32, 50, 0.8);
      transform: scale(0.98);
    }

    .jogo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .jogo-nome {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .jogo-stats {
      display: flex;
      gap: 8px;
      font-size: 0.75rem;
      flex-wrap: wrap;
    }

    .stat-item {
      background: rgba(0,194,255,0.1);
      padding: 4px 6px;
      border-radius: 4px;
      color: var(--muted);
    }

    .stat-item strong {
      color: var(--txt);
    }

    .sport-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .sport-btn {
      border: 1px solid var(--line);
      background: rgba(16, 32, 50, 0.8);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }

    .sport-btn.active {
      color: var(--bg-1);
      background: var(--accent);
      border-color: var(--accent);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 8, 14, 0.84);
      backdrop-filter: blur(6px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 780px;
      max-height: 90vh;
      overflow-y: auto;
      background: linear-gradient(160deg, #0f1f31, #0c1826);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--txt);
    }

    .modal-close {
      border: 1px solid var(--line);
      background: rgba(16, 32, 50, 0.8);
      color: var(--txt);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .analysis-block {
      background: rgba(16, 32, 50, 0.6);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .analysis-block h4 {
      font-size: 0.82rem;
      margin-bottom: 6px;
      color: #d7e8fb;
    }

    .analysis-line {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .analysis-line strong {
      color: var(--txt);
    }

    .favorite-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .favorite-team {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: rgba(16, 32, 50, 0.72);
    }

    .favorite-team.is-favorite {
      border-color: rgba(29, 209, 161, 0.55);
      background: linear-gradient(135deg, rgba(29, 209, 161, 0.18), rgba(16, 32, 50, 0.88));
      box-shadow: inset 0 0 0 1px rgba(29, 209, 161, 0.18);
    }

    .favorite-label {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .favorite-team.is-favorite .favorite-label {
      color: var(--ok);
    }

    .favorite-name {
      font-size: 0.88rem;
      font-weight: 800;
      color: var(--txt);
      margin-bottom: 4px;
    }

    .favorite-meta {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(147, 168, 191, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚽ IA Sports</h1>
      <button class="refresh-btn" onclick="refreshDados(this)" title="Atualizar">🔄</button>
    </div>

    <!-- ABA 1: RESUMO -->
    <div id="tab-resumo" class="tab-content active">
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">ROI</div>
          <div class="kpi-value ok" id="kpi-roi">-0.22%</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Banca</div>
          <div class="kpi-value accent" id="kpi-banca">1,140.68</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">CLV</div>
          <div class="kpi-value warn" id="kpi-clv">-0.22%</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Jogos</div>
          <div class="kpi-value accent" id="kpi-jogos">1</div>
        </div>
      </div>

      <div id="alertas-mobile" class="card"></div>
      <div id="top-jogos-mobile" class="card"></div>
    </div>

    <!-- ABA 2: OPORTUNIDADES -->
    <div id="tab-oportunidades" class="tab-content">
      <div class="card">
        <div class="card-title">🎯 Oportunidades Próximas</div>
        <div class="sport-filters" id="sport-filters">
          <button class="sport-btn" data-sport="todos" onclick="setSportFilter('todos', this)">Todos</button>
          <button class="sport-btn active" data-sport="futebol" onclick="setSportFilter('futebol', this)">Futebol</button>
          <button class="sport-btn" data-sport="basquete" onclick="setSportFilter('basquete', this)">Basquete</button>
        </div>
        <div id="lista-oportunidades" class="loading">
          <div class="spinner"></div> Carregando...
        </div>
      </div>
    </div>

    <!-- ABA 3: HISTÓRICO -->
    <div id="tab-historico" class="tab-content">
      <div class="card">
        <div class="card-title">📊 Evolução CLV</div>
        <div id="historico-stats" class="loading">
          <div class="spinner"></div> Carregando...
        </div>
      </div>
    </div>

    <!-- ABA 4: CONFORMAÇÃO -->
    <div id="tab-conformacao" class="tab-content">
      <div class="card">
        <div class="card-title">📈 Forma dos Times</div>
        <div id="conformacao-info" class="loading">
          <div class="spinner"></div> Carregando...
        </div>
      </div>
    </div>
  </div>

  <div id="analysis-modal" class="modal-overlay" onclick="fecharAnaliseOverlay(event, this)">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">Análise Completa do Jogo</div>
        <button class="modal-close" onclick="fecharAnalise()">Fechar</button>
      </div>
      <div id="analysis-content" class="loading"><div class="spinner"></div> Carregando análise...</div>
    </div>
  </div>

  <div class="tab-navigation">
    <button class="tab-btn active" onclick="switchTabMobile('resumo', this)">📊 Resumo</button>
    <button class="tab-btn" onclick="switchTabMobile('oportunidades', this)">🎯 Oportunidades</button>
    <button class="tab-btn" onclick="switchTabMobile('historico', this)">📈 Histórico</button>
    <button class="tab-btn" onclick="switchTabMobile('conformacao', this)">⚡ Forma</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    let dadosCache = {};
    let filtroEsporte = 'futebol';

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function switchTabMobile(tabName, clickedButton) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      if (clickedButton) {
        clickedButton.classList.add('active');
      }
    }

    function setSportFilter(tipo, clickedButton) {
      filtroEsporte = tipo;
      document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
      if (clickedButton) {
        clickedButton.classList.add('active');
      }
      renderTab2Mobile();
    }

    async function refreshDados(triggerButton) {
      const btn = triggerButton || document.querySelector('.refresh-btn');
      if (btn) {
        btn.style.animation = 'spin 0.8s linear infinite';
      }

      const parseSafeJson = async (settledResult, fallback) => {
        if (settledResult.status !== 'fulfilled') return fallback;
        if (!settledResult.value.ok) return fallback;
        try {
          return await settledResult.value.json();
        } catch {
          return fallback;
        }
      };

      try {
        const [scannerRes, alertasRes, clvRes, oportunidadesRes] = await Promise.allSettled([
          fetch('/scanner-global'),
          fetch('/alertas'),
          fetch('/clv'),
          fetch('/oportunidades')
        ]);

        let scanner = await parseSafeJson(scannerRes, dadosCache.scanner || { jogos: [], metricas: {}, banca: {}, totalJogos: 0 });
        const alertas = await parseSafeJson(alertasRes, dadosCache.alertas || { alertas: [] });
        const clv = await parseSafeJson(clvRes, dadosCache.clv || { mediaCLV: 0, totalRegistros: 0, positivos: 0, negativos: 0 });
        const oportunidades = await parseSafeJson(oportunidadesRes, dadosCache.oportunidades || { oportunidades: [] });

        // Se o scanner vier vazio, reaproveita oportunidades persistidas para manter o dashboard util.
        if ((!Array.isArray(scanner?.jogos) || scanner.jogos.length === 0) && Array.isArray(oportunidades?.oportunidades) && oportunidades.oportunidades.length > 0) {
          scanner = {
            ...scanner,
            jogos: oportunidades.oportunidades,
            totalJogos: oportunidades.oportunidades.length,
            total: oportunidades.oportunidades.length,
          };
        }

        dadosCache = { scanner, alertas, clv, oportunidades };
        renderTab1Mobile();
        renderTab2Mobile();
        renderTab3Mobile();
        renderTab4Mobile();

        const falhas = [scannerRes, alertasRes, clvRes, oportunidadesRes].filter(r => r.status !== 'fulfilled' || !r.value.ok).length;
        if (falhas > 0) {
          const alertasEl = document.getElementById('alertas-mobile');
          alertasEl.innerHTML = `
            <div class="alert-box">
              <span class="tag tag-warn">INSTAVEL</span>
              <strong>Alguns dados estao indisponiveis</strong><br>
              <small>Exibindo o que foi possivel carregar agora.</small>
            </div>
          ` + alertasEl.innerHTML;
        }
      } catch (err) {
        console.error('Erro ao carregar dados:', err);
        document.getElementById('lista-oportunidades').innerHTML = '<p style="color: var(--muted); text-align: center;">Erro ao carregar dados. Tente atualizar.</p>';
      }

      if (btn) {
        btn.style.animation = '';
      }
    }

    function renderTab1Mobile() {
      const { scanner, alertas, clv } = dadosCache;
      const roiPct = Number(scanner?.metricas?.roi || 0) * 100;

      document.getElementById('kpi-roi').textContent = roiPct.toFixed(2) + '%';
      document.getElementById('kpi-roi').className = 'kpi-value ' + (roiPct >= 0 ? 'ok' : 'risk');
      document.getElementById('kpi-banca').textContent = (Number(scanner?.banca?.bancaAtual || 0)).toFixed(0);
      document.getElementById('kpi-clv').textContent = (Number(clv?.mediaCLV || 0)).toFixed(2) + '%';
      document.getElementById('kpi-clv').className = 'kpi-value ' + (Number(clv?.mediaCLV || 0) >= 0 ? 'ok' : 'warn');
      document.getElementById('kpi-jogos').textContent = scanner?.totalJogos || 0;

      const alertasEl = document.getElementById('alertas-mobile');
      const alertasList = (dadosCache.alertas?.alertas || []).slice(0, 2);
      alertasEl.innerHTML = alertasList.length ? alertasList.map(a => `
        <div class="alert-box">
          <span class="tag ${a.nivel === 'alto' ? 'tag-risk' : 'tag-warn'}">${a.nivel.toUpperCase()}</span>
          <strong>${a.titulo}</strong><br>
          <small>${a.detalhe}</small>
        </div>
      `).join('') : '<div style="color: var(--muted); font-size: 0.85rem;">✓ Sem alertas críticos</div>';

      const topJogos = document.getElementById('top-jogos-mobile');
      const jogos = (scanner?.jogos || []).slice(0, 3);
      topJogos.innerHTML = `
        <div class="card-title">🔥 Top 3 Oportunidades</div>
        ${jogos.length ? jogos.map(j => `
          <div class="jogo-item">
            <div class="jogo-header">
              <div class="jogo-nome">${j.casa} x ${j.fora}</div>
              <span class="tag ${Number(j?.risco?.riscoTotal || 0) >= 70 ? 'tag-risk' : 'tag-warn'}">
                ${Number(j?.risco?.riscoTotal || 0).toFixed(0)}%
              </span>
            </div>
            <div class="jogo-stats">
              <div class="stat-item">Edge <strong>${Number(j?.edge?.edge || 0).toFixed(1)}%</strong></div>
              <div class="stat-item">xG <strong>${Number(j?.xg?.xgTotal || 0).toFixed(1)}</strong></div>
              <div class="stat-item">CLV <strong>${Number(j?.clv?.clv || 0).toFixed(1)}%</strong></div>
            </div>
          </div>
        `).join('') : '<p style="color: var(--muted);">Sem oportunidades no momento</p>'}
      `;
    }

    function renderTab2Mobile() {
      const oportunidades = (dadosCache.scanner?.jogos || []).length
        ? (dadosCache.scanner?.jogos || [])
        : (dadosCache.oportunidades?.oportunidades || []);
      const ordenarPorHorario = (lista) => [...(lista || [])].sort((a, b) => {
        const ta = new Date(a?.horario || 0).getTime();
        const tb = new Date(b?.horario || 0).getTime();
        return ta - tb;
      });

      const futebol = ordenarPorHorario(dadosCache.scanner?.jogosFutebol || dadosCache.oportunidades?.futebol || []);
      const basquete = ordenarPorHorario(dadosCache.scanner?.jogosBasquete || dadosCache.oportunidades?.basquete || []);
      const alvoData = dadosCache.scanner?.alvoData || dadosCache.oportunidades?.alvoData || '';
      const container = document.getElementById('lista-oportunidades');

      const formatarHora = (iso) => {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '--:--';
        return d.toLocaleTimeString('pt-BR', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false,
          timeZone: 'America/Sao_Paulo'
        });
      };

      const renderLista = (lista) => lista.map(j => `
        <div class="jogo-item" onclick="abrirAnalise('${encodeURIComponent(j.casa || '')}','${encodeURIComponent(j.fora || '')}','${encodeURIComponent(j.esporte || '')}','${encodeURIComponent(j.liga || '')}')">
          <div class="jogo-header">
            <div class="jogo-nome">${j.casa} x ${j.fora}</div>
            <strong class="accent">${formatarHora(j?.horario)}</strong>
          </div>
          <div class="jogo-stats">
            <div class="stat-item">Liga: <strong>${j.liga}</strong></div>
            <div class="stat-item">Edge <strong>${Number(j?.edge?.edge || 0).toFixed(1)}%</strong></div>
            <div class="stat-item">Risco <strong>${Number(j?.risco?.riscoTotal || 0).toFixed(0)}%</strong></div>
          </div>
          <div style="margin-top:8px;">
            <button class="sport-btn" style="font-size:0.72rem;" onclick="abrirAnaliseBotao(event,'${encodeURIComponent(j.casa || '')}','${encodeURIComponent(j.fora || '')}','${encodeURIComponent(j.esporte || '')}','${encodeURIComponent(j.liga || '')}')">Abrir análise completa</button>
          </div>
        </div>
      `).join('');

      let conteudo = '';
      if (filtroEsporte === 'futebol') {
        conteudo = futebol.length ? renderLista(futebol) : '<p style="color: var(--muted); text-align: center;">Sem jogos de futebol</p>';
      } else if (filtroEsporte === 'basquete') {
        conteudo = basquete.length ? renderLista(basquete) : '<p style="color: var(--muted); text-align: center;">Sem jogos de basquete</p>';
      } else {
        conteudo = `
          <div class="card-title" style="margin-bottom: 8px;">⚽ Futebol (${futebol.length})</div>
          ${futebol.length ? renderLista(futebol) : '<p style="color: var(--muted); text-align: center;">Sem jogos de futebol</p>'}
          <div class="card-title" style="margin: 14px 0 8px;">🏀 Basquete (${basquete.length})</div>
          ${basquete.length ? renderLista(basquete) : '<p style="color: var(--muted); text-align: center;">Sem jogos de basquete</p>'}
        `;
      }
      
      container.innerHTML = oportunidades.length ? `
        <div style="margin-bottom: 10px; color: var(--muted); font-size: 0.8rem;">Data alvo: <strong style="color: var(--txt);">${alvoData || 'amanha'}</strong> | Ordenado por horário</div>
        ${conteudo}
      ` : '<p style="color: var(--muted); text-align: center;">Sem oportunidades</p>';
    }

    function renderTab3Mobile() {
      const { clv } = dadosCache;
      const container = document.getElementById('historico-stats');
      
      container.innerHTML = `
        <div style="padding: 10px; color: var(--txt);">
          <div class="stat-item" style="margin-bottom: 8px;">Total Registros: <strong>${clv?.totalRegistros || 0}</strong></div>
          <div class="stat-item" style="margin-bottom: 8px;">CLV Médio: <strong class="${Number(clv?.mediaCLV || 0) >= 0 ? 'ok' : 'risk'}">${Number(clv?.mediaCLV || 0).toFixed(2)}%</strong></div>
          <div class="stat-item" style="margin-bottom: 8px;">Positivos: <strong class="ok">${clv?.positivos || 0}</strong></div>
          <div class="stat-item">Negativos: <strong class="risk">${clv?.negativos || 0}</strong></div>
        </div>
      `;
    }

    function renderTab4Mobile() {
      const jogos = dadosCache.scanner?.jogos || [];
      const container = document.getElementById('conformacao-info');
      
      container.innerHTML = jogos.length ? jogos.slice(0, 5).map(j => `
        <div class="jogo-item">
          <div class="jogo-header">
            <div class="jogo-nome">${j.casa}</div>
          </div>
          <div class="jogo-stats" style="font-size: 0.7rem;">
            <div class="stat-item">Forma: <strong>${(j.conformacao?.casa?.ultimos5 || 'N/A')}</strong></div>
            <div class="stat-item">Gols: <strong>${j.conformacao?.casa?.gols_media || '0.0'}</strong></div>
            <div class="stat-item">Sofre: <strong>${j.conformacao?.casa?.sofre_media || '0.0'}</strong></div>
          </div>
          ${j.lesoes?.casa?.length ? `<div style="color: var(--risk); font-size: 0.75rem;">⚠️ ${j.lesoes.casa.join(', ')}</div>` : ''}
        </div>
      `).join('') : '<p style="color: var(--muted);">Sem dados</p>';
    }

    function fecharAnalise() {
      document.getElementById('analysis-modal').classList.remove('open');
    }

    function fecharAnaliseOverlay(evt, overlay) {
      if (evt && evt.target === overlay) {
        fecharAnalise();
      }
    }

    function abrirAnaliseBotao(evt, casaEnc, foraEnc, esporteEnc, ligaEnc) {
      if (evt && typeof evt.stopPropagation === 'function') {
        evt.stopPropagation();
      }
      abrirAnalise(casaEnc, foraEnc, esporteEnc, ligaEnc);
    }

    function renderAnaliseHtml(analise) {
      const esporte = String(analise?.esporte || '').toLowerCase();
      const jogo = analise?.jogo || {};
      const integridade = analise?.integridade || {};
      const riscoClass = integridade?.classificacao === 'alto' ? 'risk' : (integridade?.classificacao === 'moderado' ? 'warn' : 'ok');
      const favorito = String(analise?.vencedorProvavel?.equipe || '');
      const renderFavorito = (time, probabilidade) => {
        const isFavorite = String(time || '') === favorito;
        return `
          <div class="favorite-team ${isFavorite ? 'is-favorite' : ''}">
            <div class="favorite-label">${isFavorite ? 'Favorito da IA' : 'Equipe'}</div>
            <div class="favorite-name">${escapeHtml(time)}</div>
            <div class="favorite-meta">Probabilidade estimada: <strong>${Number(probabilidade || 0).toFixed(2)}%</strong></div>
          </div>
        `;
      };

      if (esporte === 'basquete') {
        const proj = analise?.projecoes || {};
        return `
          <div class="analysis-grid">
            <div class="analysis-block">
              <h4>🏀 ${escapeHtml(jogo.casa)} x ${escapeHtml(jogo.fora)}</h4>
              <div class="analysis-line">Liga: <strong>${escapeHtml(jogo.liga)}</strong></div>
              <div class="analysis-line">Quem tem mais chance: <strong>${escapeHtml(analise?.vencedorProvavel?.equipe)}</strong> (${Number(analise?.vencedorProvavel?.probabilidade || 0).toFixed(2)}%)</div>
              <div class="analysis-line">Probabilidades: <strong>${escapeHtml(jogo.casa)} ${Number(analise?.probabilidades?.casa || 0).toFixed(2)}%</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(analise?.probabilidades?.fora || 0).toFixed(2)}%</strong></div>
              <div class="favorite-strip">
                ${renderFavorito(jogo.casa, analise?.probabilidades?.casa)}
                ${renderFavorito(jogo.fora, analise?.probabilidades?.fora)}
              </div>
            </div>
            <div class="analysis-block">
              <h4>📈 Projeções de Pontos</h4>
              <div class="analysis-line">Pontos no jogo todo: <strong>${escapeHtml(jogo.casa)} ${Number(proj?.pontosJogo?.casa || 0).toFixed(1)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(proj?.pontosJogo?.fora || 0).toFixed(1)}</strong> | Total <strong>${Number(proj?.pontosJogo?.total || 0).toFixed(1)}</strong></div>
              <div class="analysis-line">1º quarto: <strong>${escapeHtml(jogo.casa)} ${Number(proj?.primeiroQuarto?.casa || 0).toFixed(1)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(proj?.primeiroQuarto?.fora || 0).toFixed(1)}</strong> | Total <strong>${Number(proj?.primeiroQuarto?.total || 0).toFixed(1)}</strong></div>
              <div class="analysis-line">1º tempo: <strong>${escapeHtml(jogo.casa)} ${Number(proj?.primeiroTempo?.casa || 0).toFixed(1)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(proj?.primeiroTempo?.fora || 0).toFixed(1)}</strong> | Total <strong>${Number(proj?.primeiroTempo?.total || 0).toFixed(1)}</strong></div>
            </div>
            <div class="analysis-block">
              <h4>🛡️ Integridade / Manipulação</h4>
              <div class="analysis-line">Risco de manipulação: <strong class="${riscoClass}">${Number(integridade?.riscoManipulacao || 0).toFixed(2)} (${escapeHtml(integridade?.classificacao || '-')})</strong></div>
              <div class="analysis-line">Pode haver manipulação? <strong class="${integridade?.podeHaverManipulacao ? 'risk' : 'ok'}">${integridade?.podeHaverManipulacao ? 'SIM, monitorar' : 'Sem indícios fortes agora'}</strong></div>
              ${(integridade?.sinais || []).map((s) => `<div class="analysis-line">• ${escapeHtml(s)}</div>`).join('')}
            </div>
          </div>
        `;
      }

      const medias = analise?.medias || {};
      const probs = analise?.probabilidades || {};
      return `
        <div class="analysis-grid">
          <div class="analysis-block">
            <h4>⚽ ${escapeHtml(jogo.casa)} x ${escapeHtml(jogo.fora)}</h4>
            <div class="analysis-line">Liga: <strong>${escapeHtml(jogo.liga)}</strong></div>
            <div class="analysis-line">Maior probabilidade de vencer: <strong>${escapeHtml(analise?.vencedorProvavel?.equipe)}</strong> (${Number(analise?.vencedorProvavel?.probabilidade || 0).toFixed(2)}%)</div>
            <div class="analysis-line">Probabilidades 1X2: <strong>${escapeHtml(jogo.casa)} ${Number(probs?.casa || 0).toFixed(2)}%</strong> | Empate <strong>${Number(probs?.empate || 0).toFixed(2)}%</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(probs?.fora || 0).toFixed(2)}%</strong></div>
            <div class="favorite-strip">
              ${renderFavorito(jogo.casa, probs?.casa)}
              ${renderFavorito(jogo.fora, probs?.fora)}
            </div>
          </div>
          <div class="analysis-block">
            <h4>📊 Médias projetadas do jogo</h4>
            <div class="analysis-line">Escanteios: <strong>${escapeHtml(jogo.casa)} ${Number(medias?.escanteios?.casa || 0).toFixed(2)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(medias?.escanteios?.fora || 0).toFixed(2)}</strong> | Total <strong>${Number(medias?.escanteios?.confronto || 0).toFixed(2)}</strong></div>
            <div class="analysis-line">Gols: <strong>${escapeHtml(jogo.casa)} ${Number(medias?.gols?.casa || 0).toFixed(2)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(medias?.gols?.fora || 0).toFixed(2)}</strong> | Total <strong>${Number(medias?.gols?.confronto || 0).toFixed(2)}</strong></div>
            <div class="analysis-line">Cartões: <strong>${escapeHtml(jogo.casa)} ${Number(medias?.cartoes?.casa || 0).toFixed(2)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(medias?.cartoes?.fora || 0).toFixed(2)}</strong> | Total <strong>${Number(medias?.cartoes?.confronto || 0).toFixed(2)}</strong></div>
            <div class="analysis-line">Chutes: <strong>${escapeHtml(jogo.casa)} ${Number(medias?.chutes?.casa || 0).toFixed(2)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(medias?.chutes?.fora || 0).toFixed(2)}</strong> | Total <strong>${Number(medias?.chutes?.confronto || 0).toFixed(2)}</strong></div>
            <div class="analysis-line">Chutes no gol: <strong>${escapeHtml(jogo.casa)} ${Number(medias?.chutesNoGol?.casa || 0).toFixed(2)}</strong> | <strong>${escapeHtml(jogo.fora)} ${Number(medias?.chutesNoGol?.fora || 0).toFixed(2)}</strong> | Total <strong>${Number(medias?.chutesNoGol?.confronto || 0).toFixed(2)}</strong></div>
          </div>
          <div class="analysis-block">
            <h4>🛡️ Integridade / Manipulação</h4>
            <div class="analysis-line">Risco de manipulação: <strong class="${riscoClass}">${Number(integridade?.riscoManipulacao || 0).toFixed(2)} (${escapeHtml(integridade?.classificacao || '-')})</strong></div>
            <div class="analysis-line">Pode haver manipulação? <strong class="${integridade?.podeHaverManipulacao ? 'risk' : 'ok'}">${integridade?.podeHaverManipulacao ? 'SIM, monitorar' : 'Sem indícios fortes agora'}</strong></div>
            ${(integridade?.sinais || []).map((s) => `<div class="analysis-line">• ${escapeHtml(s)}</div>`).join('')}
          </div>
        </div>
      `;
    }

    async function abrirAnalise(casaEnc, foraEnc, esporteEnc, ligaEnc) {
      const casa = decodeURIComponent(casaEnc || '');
      const fora = decodeURIComponent(foraEnc || '');
      const esporte = decodeURIComponent(esporteEnc || '');
      const liga = decodeURIComponent(ligaEnc || '');

      const modal = document.getElementById('analysis-modal');
      const content = document.getElementById('analysis-content');
      modal.classList.add('open');
      content.className = 'loading';
      content.innerHTML = '<div class="spinner"></div> Carregando análise...';

      try {
        const qs = new URLSearchParams({ casa, fora, esporte, liga });
        const resp = await fetch(`/analise-jogo?${qs.toString()}`);
        const data = await resp.json();
        if (!resp.ok || data?.status !== 'ok') {
          throw new Error(data?.mensagem || 'Falha ao carregar análise');
        }
        content.className = '';
        content.innerHTML = renderAnaliseHtml(data.analise || {});
      } catch (err) {
        content.className = '';
        content.innerHTML = `<p style="color: var(--risk);">Erro ao carregar análise: ${escapeHtml(err?.message || 'erro inesperado')}</p>`;
      }
    }

    refreshDados(document.querySelector('.refresh-btn'));
    setInterval(refreshDados, 300000); // Atualiza a cada 5 min
  </script>
</body>
</html>
